<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Prestige School of Health Benue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
    <style>
        body { background-color: var(--deep-navy); }
        .auth-card {
            max-width: 400px;
            margin: 0 auto;
        }
        .text-center img {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="card auth-card">
            <div class="text-center mb-6">
                <img src="{{ url_for('static', path='/img/logo.svg') }}" alt="Prestige School of Health" width="48" height="48">
                <h2>Create Account</h2>
                <p style="color: var(--text-light); font-size: 0.875rem;">Verify your JAMB number to register</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="jamb_no" class="form-label">JAMB Registration Number</label>
                    <input type="text" id="jamb_no" name="jamb_no" class="form-input" placeholder="e.g. 12345678AB" required>
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="student@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Create Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Enter a secure password" required>
                </div>
                <button type="submit" class="btn btn-primary mt-4">Verify & Register</button>
            </form>
            
            <div class="text-center mt-4">
                <a href="/login" style="font-size: 0.875rem;">Already have an account? Sign In</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', path='/js/app.js') }}"></script>
</body>
</html>

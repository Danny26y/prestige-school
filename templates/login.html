<!DOCTYPE adult html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Prestige School of Health Benue</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
    <style>
        body { background-color: var(--deep-navy); }
        .auth-card {
            max-width: 400px;
            margin: 0 auto;
        }
        .text-center img {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="card auth-card">
            <div class="text-center mb-6">
                <!-- Inline SVG Logo or use static path for logo.svg -->
                <img src="{{ url_for('static', path='/img/logo.svg') }}" alt="Prestige School of Health" width="48" height="48">
                <h2>Student Portal</h2>
                <p style="color: var(--text-light); font-size: 0.875rem;">Sign in to access your dashboard</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" name="username" class="form-input" placeholder="student@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary mt-4">Sign In</button>
            </form>
            
            <div class="text-center mt-4">
                <a href="#" style="font-size: 0.875rem;">Forgot Password?</a>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="{{ url_for('static', path='/js/app.js') }}"></script>
</body>
</html>

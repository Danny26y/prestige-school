<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Application - Prestige School of Health Benue</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
    <style>
        .apply-card {
            max-width: 600px;
            margin: 2rem auto;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            position: relative;
        }

        .step-indicator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--border-color);
            z-index: 1;
        }

        .step {
            background: white;
            padding: 0 1rem;
            z-index: 2;
            color: var(--text-light);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .step.active {
            color: var(--medical-teal);
        }
    </style>
</head>

<body style="background-color: var(--medical-white);">

    <div class="container">
        <div class="card apply-card">
            <h2 class="text-center mb-6">Admission Application Form</h2>

            <div class="step-indicator">
                <span class="step active">1. Personal Info</span>
                <span class="step">2. Documents</span>
                <span class="step">3. Review</span>
            </div>

            <form id="applyForm" enctype="multipart/form-data">
                <h4 class="mb-4">Personal Information</h4>

                <div class="form-group">
                    <label class="form-label" for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" class="form-input" placeholder="Surname First"
                        required>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" class="form-input" placeholder="080XXXXXXXX" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="state">State of Origin</label>
                        <select id="state" name="state" class="form-input" required>
                            <option value="">Select State</option>
                            <option value="Benue">Benue</option>
                            <option value="Nasarawa">Nasarawa</option>
                            <option value="Kogi">Kogi</option>
                            <option value="Plateau">Plateau</option>
                            <option value="Taraba">Taraba</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 2rem 0;">

                <h4 class="mb-4">Document Upload</h4>

                <div class="form-group">
                    <label class="form-label">Recent Passport Photograph</label>
                    <label class="file-upload">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            style="color: var(--medical-teal); margin-bottom: 0.5rem;">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <span>Click to select image (Image only)</span>
                        <input type="file" name="passport" accept="image/*" required>
                    </label>
                </div>

                <div class="form-group">
                    <label class="form-label">O'Level Results (WAEC/NECO/NABTEB)</label>
                    <label class="file-upload">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            style="color: var(--medical-teal); margin-bottom: 0.5rem;">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        <span>Click to select file (PDF, JPG, PNG)</span>
                        <input type="file" name="olevel" accept=".pdf, .jpg, .jpeg, .png" required>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary mt-6">Submit Application</button>
            </form>
        </div>
    </div>

    <!-- JS -->
    <script src="{{ url_for('static', path='/js/app.js') }}"></script>
</body>

</html>
